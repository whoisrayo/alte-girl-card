<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AG Membership Card Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
body {
  margin: 0;
  font-family: 'Quicksand', sans-serif;
  background: radial-gradient(circle at top, #2b0a3d, #000);
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

.container {
  display: flex;
  gap: 25px;
  flex-wrap: wrap;
  justify-content: center;
}

.form {
  background: rgba(255,255,255,0.08);
  padding: 18px;
  border-radius: 16px;
  width: 240px;
}

.form input, .form select {
  width: 100%;
  margin: 6px 0 12px;
  padding: 8px;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg,#9333ea,#4c1d95);
  color: white;
  margin-top: 5px;
  cursor: pointer;
}

.card {
  width: 420px;
  height: 250px;
  border-radius: 20px;
  background: linear-gradient(145deg, #1a0026, #000);
  box-shadow: 0 15px 50px rgba(0,0,0,0.9);
  padding: 15px;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url('https://grainy-gradients.vercel.app/noise.svg');
  opacity: 0.3;
}

.header {
  text-align: center;
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  letter-spacing: 2px;
  color: #d8b4fe;
}

.main {
  display: flex;
  gap: 15px;
  margin-top: 10px;
}

.photo {
  width: 140px;
  height: 140px;
  background: #111;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  overflow: hidden;
  border: 1px solid #7e22ce;
  box-shadow: 0 0 25px rgba(147,51,234,0.4);
}

.photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.info {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 6px;
  font-size: 12px;
}

.name {
  font-size: 18px;
  font-weight: 600;
  color: #e9d5ff;
}

.label {
  color: #a855f7;
}

.member {
  font-size: 10px;
  opacity: 0.8;
  margin-top: 6px;
}

.signature {
  position: absolute;
  bottom: 10px;
  right: 12px;
  font-size: 12px;
  color: #c084fc;
}

</style>
</head>
<body>

<h2>AG Membership Card Generator</h2>

<div class="container">

<div class="form">
<input type="file" id="photoInput">
<input type="text" id="name" placeholder="Name">
<input type="text" id="height" placeholder="Height">
<input type="text" id="sign" placeholder="Star Sign">
<select id="category">
<option>Certified alte girl</option>
<option>youngho</option>
<option>summer princess</option>
<option>midnight muse</option>
<option>lil miss body tea</option>
<option>just a girl</option>
</select>
<button onclick="generateCard()">Generate</button>
<button onclick="downloadCard()">Download</button>
</div>

<div class="card" id="card">
<div class="header">AG MEMBERSHIP CARD</div>

<div class="main">
  <div class="photo" id="photoPreview">Insert Photo</div>

  <div class="info">
    <div class="name" id="outName"></div>
    <div><span class="label">Height:</span> <span id="outHeight"></span></div>
    <div><span class="label">Star Sign:</span> <span id="outSign"></span></div>
    <div><span class="label">Category:</span> <span id="outCategory"></span></div>
    <div class="member" id="memberId"></div>
  </div>
</div>

<div class="signature">RAYØ x Omoboi x JONATI</div>
</div>

</div>

<script>
function generateMemberID(){return 'AG-'+Math.floor(1000+Math.random()*9000)}

function generateCard(){
document.getElementById('outName').innerText=document.getElementById('name').value;
document.getElementById('outHeight').innerText=document.getElementById('height').value;
document.getElementById('outSign').innerText=document.getElementById('sign').value;
document.getElementById('outCategory').innerText=document.getElementById('category').value;

document.getElementById('memberId').innerText='ID: '+generateMemberID();

const file=document.getElementById('photoInput').files[0];
if(file){const reader=new FileReader();reader.onload=e=>{document.getElementById('photoPreview').innerHTML=`<img src="${e.target.result}">`};reader.readAsDataURL(file);} }

function downloadCard(){html2canvas(document.getElementById('card'),{scale:2}).then(canvas=>{const link=document.createElement('a');link.download='ag-card.png';link.href=canvas.toDataURL();link.click();});}
</script>

</body>
</html>
